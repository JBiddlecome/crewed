<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.5; color: #333; }
    .container { max-width: 600px; margin: 0 auto; padding: 20px; }
    .btn { display: inline-block; padding: 12px 24px; background-color: #000; color: #fff; text-decoration: none; border-radius: 6px; font-weight: 500; }
    .footer { margin-top: 30px; font-size: 12px; color: #777; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Welcome to Crewed!</h2>
    <p>Hi {{ user_email }},</p>
    <p>Thanks for signing up. Please verify your email address by clicking the button below:</p>
    <p>
      <a href="{{ confirm_url }}" class="btn">Verify Email</a>
    </p>
    <p>If the button doesn't work, you can copy and paste this link into your browser:</p>
    <p><a href="{{ confirm_url }}">{{ confirm_url }}</a></p>
    <div class="footer">
      &copy; 2026 PRISM Talent Group. All rights reserved.
    </div>
  </div>
</body>
</html>
