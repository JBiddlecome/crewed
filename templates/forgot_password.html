{% extends "base.html" %}
{% block title %}Reset Password — Crewed{% endblock %}
{% block bodyclass %}auth{% endblock %}
{% block public %}
<div class="auth-wrap">
  <div class="auth-card">
    <a class="brand" href="/">PRISM<span class="dot">.</span></a>
    <h1>Reset password</h1>
    <p class="sub">Enter your email to receive a reset link</p>
    <form method="post" action="/forgot-password">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required autofocus>
      </div>
      <button class="btn btn-block btn-lg" type="submit">Send reset link</button>
    </form>
    <p class="auth-alt">
      Remembered your password? <a href="/login">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
