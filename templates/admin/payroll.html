{% extends "base.html" %}

{% block content %}

<div class="grid grid-3" style="max-width:720px">
  <a class="card" href="/admin/timesheets" style="text-decoration:none;display:block;cursor:pointer">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
      <span style="display:flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:10px;background:rgba(248,124,80,.12)">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--coral)" stroke-width="2" stroke-linecap="round" width="22" height="22"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
      </span>
      <span style="font-weight:600;font-size:1rem;color:var(--text)">Timesheets</span>

  </a>
</div>

{% endblock %}
