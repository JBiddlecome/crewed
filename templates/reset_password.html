{% extends "base.html" %}
{% block title %}Set New Password — Crewed{% endblock %}
{% block bodyclass %}auth{% endblock %}
{% block public %}
<div class="auth-wrap">
  <div class="auth-card">
    <a class="brand" href="/">PRISM<span class="dot">.</span></a>
    <h1>Set new password</h1>
    <p class="sub">Please enter a new password for your account</p>
    <form method="post" action="/reset-password">
      <input type="hidden" name="token" value="{{ token }}">
      <div class="field">
        <label for="password">New Password</label>
        <input id="password" name="password" type="password" required autofocus minlength="8">
      </div>
      <button class="btn btn-block btn-lg" type="submit">Reset password</button>
    </form>
  </div>
</div>
{% endblock %}
